<nav class="fixed top-0 left-0 w-full md:w-20 md:h-screen flex flex-row md:flex-col items-center justify-between md:justify-center px-6 py-4 md:py-12 md:gap-10 z-[100] bg-[#031124]/80 backdrop-blur-md md:bg-transparent md:backdrop-blur-none pointer-events-none border-b border-white/5 md:border-none">
  
  <!-- Section Icons -->
  <div class="pointer-events-auto">
    <ul class="flex flex-row md:flex-col items-center gap-6 sm:gap-8 list-none m-0 p-0">
      <li *ngFor="let item of navItems()">
        <button 
          (click)="scrollTo(item.sectionId)" 
          [title]="item.label"
          class="bg-transparent border-none cursor-pointer text-gray-400 dark:text-white/40 hover:text-main dark:hover:text-main transition-all duration-300 p-2 relative group scale-110">
          
          <i class="fa-solid text-xl" [ngClass]="item.icon"></i>
          
          <!-- Tooltip-like label on hover (Desktop only) -->
          <span class="hidden md:block absolute left-full ml-4 px-2 py-1 bg-gray-900 text-white text-xs rounded opacity-0 invisible group-hover:visible group-hover:opacity-100 transition-all duration-300 whitespace-nowrap shadow-xl border border-white/10">
            {{ item.label }}
          </span>
          
        </button>
      </li>
    </ul>
  </div>

  <!-- Theme Toggle -->
  <div class="pointer-events-auto">
    <button 
      (click)="toggleTheme()"
      [title]="isDarkMode() ? 'Switch to Light Mode' : 'Switch to Dark Mode'"
      class="bg-black/5 dark:bg-white/5 hover:bg-main/20 border border-black/10 dark:border-white/10 hover:border-main/50 cursor-pointer text-gray-500 dark:text-white/50 hover:text-main rounded-full w-10 h-10 flex items-center justify-center transition-all duration-300 shadow-lg">
      <i class="fa-solid text-lg" [ngClass]="isDarkMode() ? 'fa-moon' : 'fa-sun'"></i>
    </button>
  </div>

</nav>
