<section id="experience" class="w-full min-h-screen relative flex flex-col justify-center items-center py-20 px-8 xl:px-16 overflow-hidden bg-gray-50 dark:bg-[#031124] transition-colors duration-500">
  
  <!-- Section Header -->
  <div #animatedItem class="z-10 text-center mb-16 opacity-0">
    <h2 class="text-gray-900 dark:text-white text-4xl font-light tracking-tight mb-4 transition-colors duration-500">
      Professional <span class="text-transparent bg-clip-text bg-gradient-to-r from-main to-[#1e90ff]">Experience</span>
    </h2>
    <div class="w-24 h-1 bg-main mx-auto rounded-full shadow-[0_0_10px_rgba(69,229,162,0.8)]"></div>
  </div>

  <!-- Timeline Container -->
  <div class="w-full max-w-6xl z-10 flex flex-col relative">
    
    <!-- Vertical Line (Centered on Desktop) -->
    <div class="absolute left-4 xl:left-1/2 top-0 bottom-0 w-[2px] bg-gray-300 dark:bg-white/10 transition-colors duration-500 transform xl:-translate-x-1/2"></div>

    <div *ngFor="let exp of experiences(); let i = index; let isOdd = odd" #animatedItem
         class="group w-full flex flex-col xl:flex-row xl:items-center mb-16 relative opacity-0 transition-all duration-500"
         [class.xl:flex-row-reverse]="isOdd"
         [style.animation-delay]="(i * 0.15) + 's'">
      
      <!-- Experience Content Card -->
      <div class="w-full xl:w-1/2 ml-8 xl:ml-0 relative z-10"
           [class.xl:pr-12]="!isOdd"
           [class.xl:pl-12]="isOdd">
        <div class="bg-white dark:bg-white/5 backdrop-blur-xl border border-gray-200 dark:border-white/10 rounded-3xl p-6 xl:p-8 shadow-xl dark:shadow-2xl transition-all duration-500 group-hover:-translate-y-2 group-hover:shadow-[0_20px_40px_-15px_rgba(7,30,61,0.25)] dark:group-hover:shadow-[0_15px_30px_-10px_rgba(69,229,162,0.2)] group-hover:border-main/50 dark:group-hover:border-main/30 group-hover:bg-gray-50 dark:group-hover:bg-white/10 relative overflow-hidden">
          
          <!-- Subtle top glow inside card -->
          <div class="absolute top-0 left-0 w-full h-[1px] bg-gradient-to-r from-transparent via-main/50 to-transparent opacity-0 transition-opacity duration-300 group-hover:opacity-100"></div>

          <!-- Period & Location for Mobile -->
          <div class="xl:hidden flex flex-col mb-4">
            <h4 class="text-main font-bold text-lg mb-1">{{ exp.period }}</h4>
            <div class="text-gray-600 dark:text-white/60 text-sm flex items-center gap-2">
              <i class="fa-solid fa-location-dot"></i> {{ exp.location }}
            </div>
          </div>

          <h3 class="text-gray-900 dark:text-white text-2xl font-bold mb-1 transition-colors duration-500"> <i class="fa-solid fa-suitcase mr-3"></i> {{ exp.role }}</h3>
          <h4 class="text-gray-600 dark:text-white/80 text-lg mb-4 italic transition-colors duration-500">{{ exp.company }}</h4>
          
          <ul *ngIf="exp.description.length > 0" class="list-none space-y-3">
            <li *ngFor="let item of exp.description" class="text-gray-700 dark:text-white/70 text-base leading-relaxed flex items-start transition-colors duration-500">
              <span class="text-main mr-3 mt-[5px] text-[10px]"><i class="fa-solid fa-circle"></i></span>
              <span>{{ item }}</span>
            </li>
          </ul>
        </div>
      </div>

      <!-- Timeline Marker -->
      <div class="absolute left-4 xl:left-1/2 top-10 xl:top-1/2 w-4 h-4 rounded-full bg-white dark:bg-[#031124] border-2 border-main dark:shadow-[0_0_10px_rgba(69,229,162,1)] z-20 transform -translate-x-1/2 xl:-translate-y-1/2 transition-transform group-hover:scale-150 group-hover:bg-main duration-500"></div>

      <!-- Desktop Period/Location Column -->
      <div class="hidden xl:flex xl:w-1/2 flex-col justify-center z-10"
           [class.xl:pl-12]="!isOdd"
           [class.xl:pr-12]="isOdd"
           [class.text-left]="!isOdd"
           [class.text-right]="isOdd"
           [class.items-start]="!isOdd"
           [class.items-end]="isOdd">
        <h4 class="text-main font-bold text-xl mb-2 drop-shadow-none dark:drop-shadow-[0_0_8px_rgba(69,229,162,0.5)] transition-all duration-500">{{ exp.period }}</h4>
        <div class="text-gray-600 dark:text-white/60 text-base flex items-center gap-3 transition-colors duration-500"
             [class.flex-row-reverse]="isOdd">
          <i class="fa-solid fa-location-dot"></i> {{ exp.location }}
        </div>
      </div>
    </div>
  </div>
</section>
