<section id="projects" class="w-full min-h-screen relative flex flex-col justify-center items-center py-20 px-8 xl:px-16 overflow-hidden bg-white dark:bg-[#031124] transition-colors duration-500">
  
  <!-- Section Header -->
  <div #animatedItem class="z-10 text-center mb-16 opacity-0">
    <h2 class="text-gray-900 dark:text-white text-4xl font-light tracking-tight mb-4 transition-colors duration-500">
      My <span class="text-transparent bg-clip-text bg-gradient-to-r from-main to-[#1e90ff]">Projects</span>
    </h2>
    <div class="w-24 h-1 bg-main mx-auto rounded-full shadow-[0_0_10px_rgba(69,229,162,0.8)]"></div>
  </div>

  <!-- Projects Grid -->
  <div class="w-full max-w-6xl z-10 grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-8">
    
    <div *ngFor="let project of projects(); let i = index" #animatedItem
         class="group bg-gray-50 dark:bg-white/5 backdrop-blur-xl border border-gray-200 dark:border-white/10 rounded-3xl p-8 shadow-xl dark:shadow-2xl transition-all duration-500 hover:-translate-y-2 hover:shadow-[0_20px_40px_-15px_rgba(7,30,61,0.25)] dark:hover:shadow-[0_15px_30px_-10px_rgba(69,229,162,0.2)] hover:border-main/50 dark:hover:border-main/30 hover:bg-white dark:hover:bg-white/10 relative overflow-hidden opacity-0"
         [style.animation-delay]="(i * 0.1) + 's'">
      
      <!-- Subtle top glow inside card -->
      <div class="absolute top-0 left-0 w-full h-[1px] bg-gradient-to-r from-transparent via-main/50 to-transparent opacity-0 transition-opacity duration-300 group-hover:opacity-100"></div>

      <div class="flex flex-col h-full">
        <div class="flex justify-between items-start mb-6">
          <div class="p-3 bg-main/10 rounded-2xl text-main text-2xl group-hover:scale-110 transition-transform">
            <i class="fa-solid fa-code"></i>
          </div>
          <a [href]="project.githubLink" target="_blank" rel="noopener noreferrer" class="text-gray-400 hover:text-main transition-colors text-2xl">
            <i class="fa-brands fa-github"></i>
          </a>
        </div>

        <h3 class="text-gray-900 dark:text-white text-2xl font-bold mb-3 transition-colors">{{ project.title }}</h3>
        <p class="text-gray-600 dark:text-white/70 text-base leading-relaxed mb-6 flex-grow transition-colors">
          {{ project.description }}
        </p>

        <div class="flex flex-wrap gap-2">
          <span *ngFor="let tech of project.technologies" class="px-3 py-1 bg-white dark:bg-white/10 border border-gray-200 dark:border-white/10 text-gray-700 dark:text-main text-xs font-semibold rounded-full shadow-sm">
            {{ tech }}
          </span>
        </div>
      </div>
    </div>

  </div>
</section>
